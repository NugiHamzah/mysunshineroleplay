<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Sunshine Roleplay • Daftar Pemain</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --gold:#FFD700;
    --gold2:#ffb700;

    --glass:rgba(20,20,20,.72);
    --border:rgba(255,255,255,.08);

}

body{
    font-family:'Poppins',sans-serif;
    background:
        linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.92)),
        url("https://i.imgur.com/1zbVkdz.png");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:#fff;

    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
}

.container{
    width:min(1100px,92%);
    margin:50px auto;
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.logo{
    font-size:55px;
    margin-bottom:10px;
}

.header h1{
    color:#FFD700;
    font-size:36px;
    margin-bottom:8px;
}

.header p{
    color:#d4d4d4;
    font-size:15px;
}

.status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:15px;
    padding:8px 18px;
    border-radius:30px;
    background:rgba(108,255,114,.08);
    border:1px solid rgba(108,255,114,.2);
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#6CFF72;
    box-shadow:0 0 15px #6CFF72;
}

.stats{
    margin-bottom:25px;
}

.card{
    background:rgba(20,20,20,.72);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.card h3{
    color:#FFD700;
    font-size:18px;
    line-height:1.7;
    font-weight:600;
}

.actions{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.btn,
.back-btn{

    display:inline-flex;
    align-items:center;
    justify-content:center;

    padding:13px 28px;

    border-radius:12px;

    font-weight:600;

    text-decoration:none;

    transition:.25s;

}

.btn{
    background:linear-gradient(135deg,#FFD700,#ffb700);
    color:#000;
    border:none;
    cursor:pointer;
}

.back-btn{
    background:#222;
    color:#fff;
    border:1px solid rgba(255,255,255,.08);
}

.btn:hover,
.back-btn:hover{

    transform:translateY(-3px);

}

.btn:hover{

    box-shadow:0 10px 25px rgba(255,215,0,.35);

}

.back-btn:hover{

    background:#2d2d2d;

}

.table-card{

    background:rgba(20,20,20,.72);

    backdrop-filter:blur(16px);

    border-radius:18px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 15px 40px rgba(0,0,0,.45);

}

table{

    width:100%;

    border-collapse:collapse;

}

thead{

    background:rgba(255,215,0,.10);

}

th{

    color:#FFD700;

    padding:18px;

    text-align:left;

}

td{

    padding:16px 18px;

    border-top:1px solid rgba(255,255,255,.06);

}

tbody tr{

    transition:.25s;

}

tbody tr:hover{

    background:rgba(255,255,255,.05);

}

.empty{

    text-align:center;

    color:#999;

}

@media(max-width:768px){

.header h1{

font-size:28px;

}

.logo{

font-size:45px;

}

.actions{

flex-direction:column;

}

.btn,
.back-btn{

width:100%;

}

table{

display:block;

overflow-x:auto;

white-space:nowrap;

}

}
</style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo">🌞</div>

        <h1>My Sunshine Roleplay</h1>

        <p>Daftar pemain yang sedang menjelajahi kota.</p>

        <div class="status">
            <div class="dot"></div>
            <span>Server Online</span>
        </div>

    </div>

    <div class="stats">

        <div class="card">

            <h3>
                🌆 Kota My Sunshine selalu ramai. Masuk ke dalam game, jalankan peranmu, dan ciptakan kisah terbaik bersama komunitas kami.
            </h3>

        </div>

    </div>

    <div class="actions">

        <button class="btn" onclick="fetchPlayers()">
            🔄 Refresh Data
        </button>

        <a href="index.html" class="back-btn">
            🏠 Kembali ke Beranda
        </a>

    </div>

    <div class="table-card">

        <table>

            <thead>

                <tr>

                    <th>👤 Nama Player</th>
                    <th>⏱ Durasi Login</th>
                    <th>📶 Ping</th>
                    <th>⭐ Score</th>

                </tr>

            </thead>

            <tbody id="player-list">

                <tr>

                    <td colspan="4" class="empty">

                        Memuat daftar pemain...

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="players.js"></script>
