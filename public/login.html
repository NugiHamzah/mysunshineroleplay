<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • My Sunshine Roleplay</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#07111f,#0d1d32,#081421);

color:white;

overflow:hidden;

}

.card{

width:430px;

max-width:95%;

padding:40px;

background:rgba(255,255,255,.05);

border-radius:25px;

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,.35);

}

.logo{

font-size:65px;

margin-bottom:15px;

}

h1{

margin-bottom:10px;

}

p{

color:#bbb;

line-height:1.7;

margin-bottom:30px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:50px;

cursor:pointer;

font-size:16px;

font-weight:bold;

transition:.3s;

}

#login{

background:#fff;

color:#222;

display:flex;

justify-content:center;

align-items:center;

gap:12px;

}

#login:hover{

transform:translateY(-2px);

}

#guest{

margin-top:15px;

background:#FFD54F;

color:#000;

}

img{

width:24px;

}

.footer{

margin-top:30px;

font-size:12px;

color:#888;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

☀️

</div>

<h1>

My Sunshine Roleplay

</h1>

<p>

Masuk menggunakan akun Google untuk menikmati fitur Live Kota, komentar realtime, profile pemain, event, dan berbagai fitur komunitas lainnya.

</p>

<button id="login">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Login dengan Google

</button>

<button id="guest">

Masuk Sebagai Pengunjung

</button>

<div class="footer">

© 2026 My Sunshine Roleplay

</div>

</div>

<script type="module">

import {

auth,
db,
googleProvider

} from "./firebase.js";

import {

signInWithPopup,
onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

import {

doc,
getDoc,
setDoc,
serverTimestamp

} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

// ======================================
// Sudah Login?
// ======================================

onAuthStateChanged(auth,(user)=>{

    if(user){

        location.href="live.html";

    }

});

// ======================================
// Login Google
// ======================================

document.getElementById("login").onclick=async()=>{

try{

const result=await signInWithPopup(

auth,

googleProvider

);

const user=result.user;

const ref=doc(

db,

"users",

user.uid

);

const snap=await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{

uid:user.uid,

name:user.displayName,

email:user.email,

photo:user.photoURL,

role:"player",

verified:true,

createdAt:serverTimestamp(),

lastLogin:serverTimestamp()

});

}else{

await setDoc(ref,{

lastLogin:serverTimestamp()

},{merge:true});

}

location.href="live.html";

}catch(err){

console.error(err);

alert("Login gagal.\n\n"+err.message);

}

};

// ======================================
// Guest
// ======================================

document.getElementById("guest").onclick=()=>{

location.href="index.html";

};

</script>

</body>

</html>
