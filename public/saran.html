<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Sunshine Roleplay - Kritik & Saran</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0d0d0d,#161616,#1b1b1b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px;
}

.container{
    width:100%;
    max-width:750px;
    background:#151515;
    border:1px solid rgba(255,215,0,.25);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.5);
}

.header{
    background:linear-gradient(90deg,#FFD700,#ffb300);
    color:#111;
    padding:25px;
    text-align:center;
}

.header h1{
    font-size:30px;
}

.header p{
    margin-top:5px;
    font-size:14px;
}

.back-btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#111;
    color:#FFD700;
    text-decoration:none;
    border-radius:10px;
    transition:.3s;
    font-weight:600;
}

.back-btn:hover{
    background:#222;
}

form{
    padding:35px;
}

.group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    background:#242424;
    color:white;
    border-radius:10px;
    font-size:15px;
    transition:.25s;
}

input:focus,
textarea:focus,
select:focus{
    border:1px solid gold;
    box-shadow:0 0 15px rgba(255,215,0,.35);
}

textarea{
    resize:vertical;
    min-height:170px;
}

.upload{
    border:2px dashed #FFD700;
    border-radius:12px;
    padding:30px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.upload:hover{
    background:#1d1d1d;
}

.upload input{
    display:none;
}

.preview{
    margin-top:20px;
    text-align:center;
}

.preview img{
    max-width:100%;
    border-radius:12px;
}

.info{
    margin-top:10px;
    font-size:14px;
    color:#aaa;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#FFD700,#ffae00);
    color:#111;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(255,215,0,.4);
}

.footer{
    text-align:center;
    padding:20px;
    background:#101010;
    color:#888;
    font-size:13px;
}

.required{
    color:#ff4d4d;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>💡 Kritik & Saran</h1>

<p>Bantu kami meningkatkan kualitas My Sunshine Roleplay.</p>

<a href="index.html" class="back-btn">
🏠 Kembali ke Beranda
</a>

</div>

<form id="feedbackForm">

<div class="group">

<label>Nama UCP <span class="required">*</span></label>

<input
type="text"
name="ucp"
placeholder="Masukkan Nama UCP"
required>

</div>

<div class="group">

<label>Nama Character (Opsional)</label>

<input
type="text"
name="character"
placeholder="Masukkan Nama Character">

</div>

<div class="group">

<label>Jenis Masukan</label>

<select name="kategori">

<option>Kritik</option>

<option>Saran</option>

<option>Bug Website</option>

<option>Bug Server</option>

<option>Usulan Fitur</option>

<option>Pelayanan Staff</option>

<option>Lainnya</option>

</select>

</div>

<div class="group">

<label>Judul Masukan <span class="required">*</span></label>

<input
type="text"
name="judul"
placeholder="Contoh: Tambahkan Sistem Baru"
required>

</div>

<div class="group">

<label>Isi Kritik / Saran <span class="required">*</span></label>

<textarea
name="pesan"
placeholder="Tuliskan kritik atau saran secara sopan, jelas, dan detail..."
required></textarea>

</div>

<div class="group">

<label>Lampiran (Opsional)</label>

<label class="upload">

📷 Klik di sini untuk Upload Screenshot

<input
type="file"
id="file"
name="lampiran"
accept="image/*">

</label>

<div class="preview" id="preview"></div>

<div class="info">

Format: JPG • PNG • JPEG

</div>

</div>

<button type="submit">

💡 Kirim Kritik & Saran

</button>

</form>

<div class="footer">

Terima kasih telah membantu mengembangkan My Sunshine Roleplay ❤️

<br><br>

© 2026 My Sunshine Roleplay

</div>

</div>

<script>

const file=document.getElementById("file");
const preview=document.getElementById("preview");

file.onchange=()=>{

preview.innerHTML="";

const f=file.files[0];

if(!f)return;

const url=URL.createObjectURL(f);

preview.innerHTML=`<img src="${url}">`;

}

document.getElementById("feedbackForm").onsubmit=async(e)=>{

e.preventDefault();

const form=new FormData(e.target);

try{

const res=await fetch("/api/feedback",{

method:"POST",

body:form

});

const data=await res.json();

if(data.success){

alert("Terima kasih! Kritik & saran berhasil dikirim.");

e.target.reset();

preview.innerHTML="";

}else{

alert(data.message);

}

}catch{

alert("Terjadi kesalahan pada server.");

}

}

</script>

</body>
</html>
